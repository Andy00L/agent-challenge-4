worker_processes 1;
daemon off;
pid /tmp/nginx.pid;
error_log stderr;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;
    access_log off;

    # Temp directories writable by non-root user
    client_body_temp_path /tmp/nginx_client_temp;
    proxy_temp_path /tmp/nginx_proxy_temp;
    fastcgi_temp_path /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path /tmp/nginx_uwsgi_temp;
    scgi_temp_path /tmp/nginx_scgi_temp;

    # WebSocket connection upgrade — sets "upgrade" for WS, "close" for HTTP
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream elizaos {
        server 127.0.0.1:3002;
    }

    upstream fleetapi {
        server 127.0.0.1:3001;
    }

    server {
        listen 3000;

        # Fleet API — all /fleet* requests to port 3001 (includes /fleet/socket.io for WebSocket)
        location /fleet {
            proxy_pass http://fleetapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
        }

        # ElizaOS API
        location /api/ {
            proxy_pass http://elizaos;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
        }

        # Socket.IO WebSocket (ElizaOS)
        location /socket.io/ {
            proxy_pass http://elizaos;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ElizaOS health endpoints
        location /healthz {
            proxy_pass http://elizaos;
        }

        location /health {
            proxy_pass http://elizaos;
        }

        # Custom frontend (static files with SPA fallback)
        location / {
            root /app/frontend/dist;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
